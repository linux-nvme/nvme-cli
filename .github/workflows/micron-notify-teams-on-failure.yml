# Workflow to send MS Teams notification on workflow failures

name: Micron - Notify Teams on Failure

on:
  workflow_run:
    workflows:
      - "Micron - Test Notifications"
      - "Micron - Merge master to mingw"
    types:
      - completed

jobs:
  notify-teams:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send Teams Notification
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          WORKFLOW_URL="${{ github.event.workflow_run.html_url }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          REPO="${{ github.repository }}"
          TRIGGERED_BY="${{ github.event.workflow_run.triggering_actor.login }}"

          # Create Teams adaptive card payload
          cat > payload.json <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Workflow Failed: ${WORKFLOW_NAME}",
            "themeColor": "FF0000",
            "title": "❌ Workflow Failed: ${WORKFLOW_NAME}",
            "sections": [
              {
                "activityTitle": "Repository: ${REPO}",
                "facts": [
                  {
                    "name": "Branch:",
                    "value": "${BRANCH}"
                  },
                  {
                    "name": "Commit:",
                    "value": "${COMMIT_SHORT}"
                  },
                  {
                    "name": "Triggered by:",
                    "value": "${TRIGGERED_BY}"
                  },
                  {
                    "name": "Status:",
                    "value": "Failed"
                  }
                ]
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "View Workflow Run",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${WORKFLOW_URL}"
                  }
                ]
              },
              {
                "@type": "OpenUri",
                "name": "View Commit",
                "targets": [
                  {
                    "os": "default",
                    "uri": "https://github.com/${REPO}/commit/${COMMIT}"
                  }
                ]
              }
            ]
          }
          EOF

          # Send notification to Teams webhook
          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "${{ secrets.TEAMS_WEBHOOK_URL }}"
