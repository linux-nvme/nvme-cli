---
# SPDX-License-Identifier: GPL-2.0-or-later
#
# Test workflow to evaluate notification mechanisms
# This workflow intentionally fails to trigger notifications

name: Micron - Test Notifications

on:
  workflow_dispatch:
    inputs:
      should_fail:
        description: 'Should this workflow fail?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  test-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate work
        run: |
          echo "Starting test workflow..."
          echo "This is a test to evaluate notification mechanisms"
          sleep 2
          echo "Work simulation complete"

      - name: Intentional failure step
        if: ${{ github.event.inputs.should_fail == 'true' }}
        run: |
          echo "::error::This is an intentional failure to test notifications"
          echo "Simulating a workflow failure..."
          exit 1

      - name: Success step
        if: ${{ github.event.inputs.should_fail == 'false' }}
        run: |
          echo "Workflow completed successfully (no notifications should be sent)"
