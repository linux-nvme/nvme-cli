version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  apt_packages:
    - meson
  jobs:
    install:
      - pip install asciidoc sphinx
    pre_build:
      - scripts/build.sh rst_docs

sphinx:
  configuration: .build-ci/libnvme/doc/conf.py
